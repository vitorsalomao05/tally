<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Candidate B — "Reveal hat": a clean top-hat silhouette in the brand
       gradient, with a gold hat-band (the single gold accent) and a spark.
       Most iconic / instantly "magic"; the meter reads via the band level. -->
  <defs>
    <linearGradient id="bodyB" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1A2B"/>
      <stop offset="1" stop-color="#0B0A10"/>
    </linearGradient>
    <linearGradient id="accentB" x1="300" y1="700" x2="724" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <radialGradient id="glowB" cx="512" cy="470" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheenB" x1="512" y1="100" x2="512" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="sqB"><rect x="100" y="100" width="824" height="824" rx="184"/></clipPath>
    <!-- crown clip so the band stays inside the crown -->
    <clipPath id="crownB"><path d="M398 642 V356 a44 44 0 0 1 44 -44 H582 a44 44 0 0 1 44 44 V642 Z"/></clipPath>
  </defs>

  <g clip-path="url(#sqB)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bodyB)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#glowB)"/>
    <rect x="100" y="100" width="824" height="330" fill="url(#sheenB)"/>

    <!-- Brim. -->
    <rect x="214" y="636" width="596" height="76" rx="38" fill="url(#accentB)"/>
    <!-- Crown (rounded-top rect meeting the brim). -->
    <path d="M398 642 V356 a44 44 0 0 1 44 -44 H582 a44 44 0 0 1 44 44 V642 Z" fill="url(#accentB)"/>
    <!-- Gold hat band. -->
    <g clip-path="url(#crownB)">
      <rect x="398" y="556" width="228" height="52" fill="#F5C451"/>
    </g>
    <!-- Soft top sheen on the crown. -->
    <path d="M398 470 V356 a44 44 0 0 1 44 -44 H582 a44 44 0 0 1 44 44 V470 Z" fill="#FFFFFF" opacity="0.08"/>

    <!-- Spark, top-right. -->
    <g transform="translate(706 326)">
      <path d="M0 -58 C 9 -17, 17 -9, 58 0 C 17 9, 9 17, 0 58 C -9 17, -17 9, -58 0 C -17 -9, -9 -17, 0 -58 Z"
            fill="#F5C451"/>
    </g>
  </g>

  <rect x="101.5" y="101.5" width="821" height="821" rx="182.5"
        fill="none" stroke="#3A3357" stroke-width="3"/>
</svg>
