<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Candidate C — "H-meter monogram": an H whose two posts are usage meters
       (dark track + violet→magenta fill at different levels), joined by a
       crossbar, with a gold spark. Reads as both "H" and "metering". -->
  <defs>
    <linearGradient id="bodyC" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1A2B"/>
      <stop offset="1" stop-color="#0B0A10"/>
    </linearGradient>
    <linearGradient id="accentC" x1="360" y1="720" x2="664" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <radialGradient id="glowC" cx="512" cy="500" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheenC" x1="512" y1="100" x2="512" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="sqC"><rect x="100" y="100" width="824" height="824" rx="184"/></clipPath>
    <clipPath id="postL"><rect x="356" y="300" width="104" height="424" rx="52"/></clipPath>
    <clipPath id="postR"><rect x="564" y="300" width="104" height="424" rx="52"/></clipPath>
  </defs>

  <g clip-path="url(#sqC)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bodyC)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#glowC)"/>
    <rect x="100" y="100" width="824" height="330" fill="url(#sheenC)"/>

    <!-- Left post: meter ~80% full. -->
    <g clip-path="url(#postL)">
      <rect x="356" y="300" width="104" height="424" fill="#2A2540"/>
      <rect x="356" y="384" width="104" height="340" fill="url(#accentC)"/>
    </g>
    <!-- Right post: meter ~55% full. -->
    <g clip-path="url(#postR)">
      <rect x="564" y="300" width="104" height="424" fill="#2A2540"/>
      <rect x="564" y="490" width="104" height="234" fill="url(#accentC)"/>
    </g>
    <!-- Crossbar of the H. -->
    <rect x="408" y="460" width="208" height="104" rx="20" fill="url(#accentC)"/>

    <!-- Gold spark over the right post (the reveal). -->
    <g transform="translate(616 452)">
      <path d="M0 -46 C 7 -14, 14 -7, 46 0 C 14 7, 7 14, 0 46 C -7 14, -14 7, -46 0 C -14 -7, -7 -14, 0 -46 Z"
            fill="#F5C451"/>
    </g>
  </g>

  <rect x="101.5" y="101.5" width="821" height="821" rx="182.5"
        fill="none" stroke="#3A3357" stroke-width="3"/>
</svg>
