<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none"
     xmlns="http://www.w3.org/2000/svg">
  <!--
    Houdini app icon — the escapist's top hat, the source of the reveal.
    A flared violet→magenta crown, a gold hat-band + escaping spark (the brand's
    single gold accent), on a velvet squircle. macOS Big Sur+ grid: an 824×824
    squircle body centered in a 1024 canvas (100px margin; the system adds the
    drop shadow). The WEB uses this same hat as a FREE mark (no squircle); only
    the app icon keeps the card, because Apple masks app icons.
    Source of truth — render-icon.sh rasterizes it (qlmanage, CommandLineTools-
    only) to AppIcon.icns. Uses only primitives qlmanage renders faithfully:
    rect / ellipse / path / linearGradient / radialGradient / clipPath. No filters.
  -->
  <defs>
    <linearGradient id="body" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1A2B"/>
      <stop offset="1" stop-color="#0B0A10"/>
    </linearGradient>
    <linearGradient id="accent" x1="300" y1="708" x2="724" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="470" r="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="512" y1="100" x2="512" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="sq"><rect x="100" y="100" width="824" height="824" rx="184"/></clipPath>
    <clipPath id="crown"><path d="M387 642 L354.5 352 Q352 292 414.5 292 L609.5 292 Q672 292 669.5 352 L637 642 Z"/></clipPath>
  </defs>

  <!-- Velvet body + ambient violet glow + top sheen, clipped to the squircle. -->
  <g clip-path="url(#sq)">
    <rect x="100" y="100" width="824" height="824" fill="url(#body)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#glow)"/>
    <rect x="100" y="100" width="824" height="330" fill="url(#sheen)"/>

    <!-- Brim: a flattened curved ellipse with a soft underside shadow. -->
    <ellipse cx="512" cy="657" rx="310" ry="75" fill="url(#accent)"/>
    <ellipse cx="512" cy="639.5" rx="310" ry="60" fill="#000000" opacity="0.12"/>

    <!-- Crown: flared (wider at the top), rounded-top, meeting the brim. -->
    <path d="M387 642 L354.5 352 Q352 292 414.5 292 L609.5 292 Q672 292 669.5 352 L637 642 Z" fill="url(#accent)"/>
    <g clip-path="url(#crown)">
      <!-- crown top sheen -->
      <path d="M387 477 L354.5 352 Q352 292 414.5 292 L609.5 292 Q672 292 669.5 352 L652 477 Z" fill="#FFFFFF" opacity="0.10"/>
      <!-- gold hat-band: the level marker + the single gold accent -->
      <rect x="312" y="517" width="400" height="72.5" fill="#F5C451"/>
      <rect x="312" y="517" width="400" height="22.5" fill="#FFFFFF" opacity="0.22"/>
    </g>

    <!-- The reveal: a gold spark escaping over the hat, with a small trailing one. -->
    <g transform="translate(737 242.5) scale(25)">
      <path d="M0 -4.4 C0.7 -1.3 1.3 -0.7 4.4 0 C1.3 0.7 0.7 1.3 0 4.4 C-0.7 1.3 -1.3 0.7 -4.4 0 C-1.3 -0.7 -0.7 -1.3 0 -4.4 Z" fill="#F5C451"/>
    </g>
    <g transform="translate(642 152) scale(25)">
      <path d="M0 -1.9 C0.3 -0.57 0.57 -0.3 1.9 0 C0.57 0.3 0.3 0.57 0 1.9 C-0.3 0.57 -0.57 0.3 -1.9 0 C-0.57 -0.3 -0.3 -0.57 0 -1.9 Z" fill="#F5C451" opacity="0.88"/>
    </g>
  </g>

  <!-- Hairline inner border for crisp definition on light desktops. -->
  <rect x="101.5" y="101.5" width="821" height="821" rx="182.5"
        fill="none" stroke="#3A3357" stroke-width="3"/>
</svg>
